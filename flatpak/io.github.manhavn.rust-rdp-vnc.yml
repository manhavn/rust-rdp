# Flatpak manifest for Rust RDP VNC (local build + Flathub-ready layout).
#
# Local build (from repo root):
#   ./scripts/publish-flatpak.sh
#
# Flathub: copy this folder’s contents into a flathub app branch and point
# the git source at a tagged release (see scripts/publish-flatpak.sh --help).

id: io.github.manhavn.rust-rdp-vnc
runtime: org.gnome.Platform
# GNOME 47 is EOL on Flathub; use current Platform (tracks freedesktop 25.08).
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20

command: rust-rdp-vnc
finish-args:
  # Minimal sandbox: network for RDP/VNC; display; GPU.
  # Open/save dialogs use the FileChooser portal (rfd xdg-portal) — do NOT
  # use --filesystem=home (Flathub linter: finish-args-home-filesystem-access).
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
  env:
    CARGO_HOME: /run/build/rust-rdp-vnc/cargo
    # openh264 / bindgen
    LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib

modules:
  # Generated offline crates: flatpak/generated-sources.json
  # Created by: ./scripts/publish-flatpak.sh --generate-sources
  - name: rust-rdp-vnc
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/rust-rdp-vnc/cargo
      # Network only as last-resort fallback if offline vendor is missing.
      # Prefer: ./scripts/publish-flatpak.sh --generate-sources
      build-args:
        - --share=network
    build-commands:
      - install -d /app/bin
      # Offline when flatpak-cargo-generator laid out cargo/; else network (local only).
      - |
        set -e
        if [ -f cargo/config ] || [ -f cargo/config.toml ] || [ -d cargo/vendor ]; then
          echo "Building offline with vendored crates…"
          cargo --offline build --release -p rust-rdp-vnc-desktop --verbose
        else
          echo "WARNING: no cargo vendor tree — building WITH network (not Flathub-safe)."
          echo "Run: ./scripts/publish-flatpak.sh --generate-sources"
          cargo build --release -p rust-rdp-vnc-desktop --verbose
        fi
      - install -Dm755 target/release/rust-rdp-vnc /app/bin/rust-rdp-vnc
      - install -Dm644 flatpak/io.github.manhavn.rust-rdp-vnc.desktop /app/share/applications/io.github.manhavn.rust-rdp-vnc.desktop
      - install -Dm644 flatpak/io.github.manhavn.rust-rdp-vnc.metainfo.xml /app/share/metainfo/io.github.manhavn.rust-rdp-vnc.metainfo.xml
      - install -Dm644 desktop/assets/icon.png /app/share/icons/hicolor/256x256/apps/io.github.manhavn.rust-rdp-vnc.png
      - install -Dm644 desktop/assets/icon-512.png /app/share/icons/hicolor/512x512/apps/io.github.manhavn.rust-rdp-vnc.png
    sources:
      # Local development: working tree + offline crates (generated-sources.json).
      - type: dir
        path: ..
      # Vendored crates for sandboxed / offline cargo (required for reliable builds).
      # Generate with: ./scripts/publish-flatpak.sh --generate-sources
      - generated-sources.json
      # Flathub submission uses the .flathub.yml.template instead (git tag + same json).
